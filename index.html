<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lotus Louts</title>
<style>
  :root{
    --ink:#1c2733; --muted:#5b6b7a; --rule:#dfe6ec; --bg:#fbfcfd; --accent:#0b5fa5;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font:17px/1.65 "Segoe UI", system-ui, -apple-system, sans-serif;
    min-height:100vh; display:grid; place-items:center;
  }
  main{max-width:34rem; padding:2rem 1.5rem; text-align:center}
  h1{font-size:1.75rem; margin:0 0 .5rem; font-weight:650}
  p{margin:.5rem 0; color:var(--muted)}
  .links{margin-top:1.75rem}
  .links a{
    display:inline-block; margin:0 .5rem; padding:.55rem 1.1rem;
    border:1px solid var(--rule); border-radius:6px; background:#fff;
    color:var(--accent); text-decoration:none; font-size:.95rem;
  }
  .links a:hover{border-color:var(--accent)}
</style>
</head>
<body>
<main>
  <h1>Lotus Lotus</h1>
  <p>Publisher of free custom visuals for Microsoft Power BI.</p>
  <div class="links">
    <a href="/support.html">Support</a>
    <a href="/privacy.html">Privacy policy</a>
  </div>
</main>
</body>
</html>
